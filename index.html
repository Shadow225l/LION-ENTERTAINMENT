<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LION-ENTERTAINMENT</title>

<style>
:root{
    --bg:#0b0b10;
    --panel:#141420;
    --panel2:#1b1b2a;
    --accent:#ff004c;
    --text:#ffffff;
    --muted:#a0a0b0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:60px;
    background:rgba(20,20,32,0.9);
    backdrop-filter: blur(10px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    border-bottom:1px solid #222;
    z-index:1000;
}

.logo{
    font-weight:bold;
    color:var(--accent);
    letter-spacing:1px;
}

/* LAYOUT */
.container{
    display:flex;
    margin-top:60px;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    height:calc(100vh - 60px);
    position:fixed;
    background:var(--panel);
    padding:15px;
    border-right:1px solid #222;
}

.nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
    margin-bottom:8px;
    border-radius:10px;
    cursor:pointer;
    color:var(--muted);
    transition:.2s;
}

.nav-item:hover{
    background:var(--panel2);
    color:white;
}

.nav-item svg{
    width:20px;
    height:20px;
    fill:currentColor;
}

/* CONTENT */
.content{
    margin-left:240px;
    padding:20px;
    width:100%;
}

.section{display:none;}
.section.active{display:block;}

/* CARDS */
.card{
    background:var(--panel);
    border:1px solid #222;
    border-radius:14px;
    padding:15px;
    margin-bottom:15px;
}

/* POSTS */
.post{
    background:var(--panel);
    border:1px solid #222;
    border-radius:14px;
    padding:12px;
    margin-top:12px;
}

.post-header{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--muted);
}

.post img,
.post video{
    width:100%;
    margin-top:10px;
    border-radius:12px;
}

/* INPUTS */
input,textarea,button,select{
    width:100%;
    margin-top:8px;
    padding:10px;
    border-radius:10px;
    border:1px solid #222;
    background:#0f0f18;
    color:white;
}

button{
    background:var(--accent);
    border:none;
    cursor:pointer;
}

button:hover{
    opacity:0.85;
}

/* HERO */
.hero{
    background:linear-gradient(135deg,#1a1a2e,#0b0b10);
    padding:20px;
    border-radius:14px;
    margin-bottom:15px;
}

/* MOBILE */
body.mobile .sidebar{
    width:100%;
    height:60px;
    bottom:0;
    top:auto;
    display:flex;
    justify-content:space-around;
}

body.mobile .nav-item span{
    display:none;
}

body.mobile .content{
    margin-left:0;
    padding-bottom:80px;
}

</style>
</head>

<body>

<header>
<div class="logo">LION-ENTERTAINMENT</div>
</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="nav-item" onclick="show('home')">
<svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v10h-5v-6H11v6H6V11H3z"/></svg>
<span>Inicio</span>
</div>

<div class="nav-item" onclick="show('posts')">
<svg viewBox="0 0 24 24"><path d="M19 11H13V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
<span>Publicaciones</span>
</div>

<div class="nav-item" onclick="show('settings')">
<svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.1 7.1 0 0 0-1.63-.94l-.36-2.54A.5.5 0 0 0 13.9 2h-3.8a.5.5 0 0 0-.49.42l-.36 2.54c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.48a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.31.6.22l2.39-.96c.51.4 1.05.71 1.63.94l.36 2.54c.04.24.25.42.49.42h3.8c.24 0 .45-.18.49-.42l.36-2.54c.58-.23 1.12-.54 1.63-.94l2.39.96c.22.09.47 0 .6-.22zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5z"/></svg>
<span>Configuración</span>
</div>

<div class="nav-item" onclick="toggleMobile()">
<svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.95 7.95 0 0 0 12 4V1L7 6l5 5V7a5 5 0 1 1-5 5H5a7 7 0 1 0 12.65-5.65z"/></svg>
<span>Mobile</span>
</div>

</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="section active">

<div class="hero">
<h2>🎬 Inicio</h2>
<p>Contenido oficial de LION-ENTERTAINMENT</p>
</div>

<div class="card">
<h3>🔥 Últimos videos</h3>

<iframe
width="100%"
height="300"
style="border-radius:12px;border:none;"
src="https://www.youtube.com/embed?listType=user_uploads&list=UCdOewqZIR7UWJpc7-D1kq0w"
allowfullscreen>
</iframe>

</div>

</div>

<!-- POSTS -->
<div id="posts" class="section">

<div class="card">
<h3>➕ Crear publicación</h3>
<textarea id="postText"></textarea>
<input type="file" id="postMedia">
<input type="password" id="postPass" placeholder="Contraseña">
<button onclick="publish()">Publicar</button>
</div>

<div id="feed"></div>

</div>

<!-- SETTINGS -->
<div id="settings" class="section">

<div class="card">
<h3>⚙️ Configuración</h3>

<div id="auth">
<input id="user" placeholder="Usuario">
<input id="pass" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<p id="status"></p>

</div>

</div>

</div>

<script>

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toggleMobile(){
document.body.classList.toggle("mobile");
}

/* POSTS */
let posts=[];

function publish(){
let t=document.getElementById("postText").value;
let f=document.getElementById("postMedia").files[0];

if(!t && !f) return;

if(f){
let r=new FileReader();
r.onload=e=>addPost(t,e.target.result,f.type);
r.readAsDataURL(f);
}else addPost(t,null,null);
}

function addPost(t,m,type){
posts.unshift({
text:t,
media:m,
type:type,
time:new Date().toLocaleString()
});

render();
}

function render(){
let feed=document.getElementById("feed");
feed.innerHTML="";

posts.forEach(p=>{
let media="";

if(p.media){
if(p.type.startsWith("image")){
media=`<img src="${p.media}">`;
}else{
media=`<video src="${p.media}" controls></video>`;
}
}

feed.innerHTML+=`
<div class="post">
<div class="post-header">
<span>👤 Usuario</span>
<span>${p.time}</span>
</div>
<div>${p.text||""}</div>
${media}
</div>`;
});
}

</script>

</body>
</html>
